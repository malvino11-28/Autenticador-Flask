<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Cadastro</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body
    class="bg-dark text-light d-flex align-items-center justify-content-center vh-100"
  >
    <div class="card bg-secondary text-light p-4 shadow" style="width: 350px">
      <h3 class="text-center mb-4">Cadastro</h3>

      {% if error %}
      <div class="alert alert-danger text-center">{{ error }}</div>
      {% endif %}

      <form method="POST" action="/cadastro">
        <div class="mb-3">
          <label class="form-label">Nome</label>
          <input type="text" name="name" class="form-control" required />
        </div>

        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" required />
        </div>

        <div class="mb-3">
          <label class="form-label">Senha</label>
          <input type="password" name="senha" class="form-control" required />
        </div>

        <button type="submit" class="btn btn-success w-100 mb-2">
          Cadastrar
        </button>
      </form>

      <div class="text-center mt-2">
        <small>Já tem conta?</small><br />
        <a href="/login" class="btn btn-outline-light btn-sm mt-2">
          Fazer login
        </a>
      </div>
    </div>
  </body>
</html>
