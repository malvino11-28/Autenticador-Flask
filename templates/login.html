<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Login</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body
    class="bg-dark text-light d-flex align-items-center justify-content-center vh-100"
  >
    <div class="card bg-secondary text-light p-4 shadow" style="width: 350px">
      <h3 class="text-center mb-4">Login</h3>

      {% if error %}
      <div class="alert alert-danger text-center">{{ error }}</div>
      {% endif %}

      <form method="POST" action="/login">
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" required />
        </div>

        <div class="mb-3">
          <label class="form-label">Senha</label>

          <div class="input-group">
            <input
              type="password"
              name="senha"
              id="password"
              class="form-control"
              required
            />
            <button
              type="button"
              class="btn btn-outline-light"
              onclick="togglePassword()"
            >
              <svg
                xmlns="http://w3.org"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-100 mb-2">Entrar</button>
      </form>

      <div class="text-center mt-2">
        <small>Não tem conta?</small><br />
        <a href="/cadastro" class="btn btn-outline-light btn-sm mt-2">
          Criar conta
        </a>
      </div>
    </div>

    <script>
      function togglePassword() {
        const input = document.getElementById("password");
        input.type = input.type === "password" ? "text" : "password";
      }
    </script>
  </body>
</html>
