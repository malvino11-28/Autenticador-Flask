<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Dashboard</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body
    class="bg-dark text-light min-vh-100 d-flex align-items-center justify-content-center"
  >
    <div
      class="card bg-secondary text-light shadow p-4 text-center"
      style="width: 400px"
    >
      <h2 class="mb-3">Login realizado com sucesso!</h2>
      <p class="mb-4">Bem-vindo, <strong>{{ username }}</strong></p>

      <div class="d-grid gap-2">
        <a href="/logout" class="btn btn-danger">Sair</a>
      </div>
    </div>
  </body>
</html>
